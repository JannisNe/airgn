channel:
- access:
  - ZTF_PUB
  name: wise
  policy: []
  version: 0
mongo:
  prefix: feets_bright
  reset: false
name: agn_variability_features
task:
- config:
    compiler_opts: TiCompilerOptions
    directives:
    - channel: wise
      filter:
        unit: TimewiseFilter
        config:
          n_visits: 20
      ingest:
        mux:
          combine:
          - state_t2:
            - unit: T2StackVisits
            - unit: T2FeetsTimewise
              config:
                t2_dependency:
                  - unit: T2StackVisits
                single_band_features:
                  - Autocor_length
                  - EtaE
                  - Eta
                  - ExcessVariance
                  - Mean
                  - MeanVariance
                  - ReducedChi2
                multi_band_features:
                  - PearsonsR
                  - RedderWhenBrighter0
                  - RedderWhenBrighter1
                  - StetsonL
            unit: T1SimpleCombiner
          unit: TiMongoMuxer
    iter_max: 10000
    shaper: TiDataPointShaper
    supplier:
      config:
        dpid: hash
        loader:
          config:
            timewise_config_file: $AIRGNSOURCE/airgn/desi/desi_agn_value_added_catalog.yml
            stock_id_column_name: orig_id
          unit: TimewiseFileLoader
      unit: TimewiseAlertSupplier
  multiplier: 1
  title: t0
  template:
    live:
      - resolve_run_time_aliases
      - hash_t2_config
  unit: AlertConsumer

- config:
    log_profile: default
  multiplier: 1
  title: t2
  unit: T2Worker

- title: PlotChi2
  unit: T3Processor
  config:
    raise_exc: true
    supply:
      unit: T3DefaultBufferSupplier
      config:
        select:
          unit: T3StockSelector
          config:
            channel: "wise"
        load:
          unit: T3SimpleDataLoader
          config:
            directives:
              - T2DOC
              - STOCK
            channel: "wise"
        chunk_size: 10000
    stage:
      unit: T3SequentialStager
      config:
        execute:
          - unit: FeetsOfAGN
            config:
              path: $AIRGNDATA/desi_value_added_catalog/plots/feets_bright
              input_mongo_db_name: desi_agn_vac
              n_points_bins: [20, 30]
              exclude_features:
                - Mean
                - NPoints